# Self-host the full app (web UI + sync server) from prebuilt images
#
# Postgres is bundled by default (data lives in the doska-pgdata volume), so this
# is genuinely one command. To use your own managed Postgres instead, set
# DATABASE_URL in .env — the server will use it and the bundled db sits idle
# (comment the `db` service out if you want it gone).
#
# For automatic HTTPS, set DOMAIN in .env and add `--profile https` to start a
# Caddy reverse proxy in front (Let's Encrypt certs, auto-renewed):
#   docker compose -f docker-compose.selfhost.yml --profile https up -d
services:
  server:
    image: ghcr.io/romenkova/doska-server:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      # Defaults to the bundled Postgres below; override with your own managed
      # DATABASE_URL to skip it entirely.
      DATABASE_URL: ${DATABASE_URL:-postgres://doska:${POSTGRES_PASSWORD:-doska}@db:5432/doska}
      # Auth credentials come from the env (see .env.selfhost.example).
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      # Attachments are optional: leave S3_BUCKET unset and the feature stays off
      # (the attach button shows a "set up sync" hint). Set these to enable it.
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      FILE_MAX_BYTES: ${FILE_MAX_BYTES:-}
      PORT: 3000
      NODE_ENV: production
      # remove once it's public.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # This server's public origin, e.g. https://doska.example.com — no trailing
      # slash. OAuth discovery advertises absolute URLs (issuer, token endpoint,
      # the resource_metadata an MCP client is pointed at), so without this they
      # get inferred from proxy headers and an MCP client gets sent to the wrong
      # scheme or host. Cookie auth survives that; MCP does not.
      BASE_URL: ${BASE_URL:?set BASE_URL in .env, e.g. https://doska.example.com}
    depends_on: { db: { condition: service_healthy } }
    healthcheck:
      # Migrations run on boot before the port opens, hence the start_period.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/version').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  web:
    image: ghcr.io/romenkova/doska-web:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Remove this service (and the server's depends_on above)
  # if you point DATABASE_URL at your own managed database.
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: doska
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doska}
      POSTGRES_DB: doska
    volumes:
      - doska-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doska -d doska"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Optional TLS terminator, only started with `--profile https`. Fetches and
  # renews a Let's Encrypt cert for DOMAIN and proxies to the web container.
  # Set BASE_URL=https://$DOMAIN in .env so OAuth/MCP advertise the right origin.
  caddy:
    image: caddy:2-alpine
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    # DOMAIN is required for this profile; unset it and Caddy errors on start.
    command: caddy reverse-proxy --from ${DOMAIN:-} --to web:80
    depends_on:
      - web
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  doska-pgdata:
  caddy-data:
  caddy-config:
