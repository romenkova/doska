server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The prerendered shell references the hashed assets, so caching it pins
    # visitors to an old build after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The site is one prerendered page, so an unknown path is a real 404 — an
    # index.html fallback here would answer every crawled typo with a soft 200.
    location / {
        try_files $uri $uri/ =404;
    }
}
