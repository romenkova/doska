# Shared service definitions reused by the deploy-target compose files via
# `extends:`. Not meant to be run on its own — it carries no networks or
# published ports. See docker-compose.yml (generic) and
# docker-compose.dokploy.yml (Dokploy).
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      PORT: 3000
      NODE_ENV: production
      # Desktop auto-update proxy (src/updates.ts). Optional — when UPDATE_REPO
      # is empty the /desktop routes stay disabled. Defaults keep deploys from
      # failing when they're unset.
      UPDATE_REPO: ${UPDATE_REPO:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      UPDATE_PUBLIC_BASE: ${UPDATE_PUBLIC_BASE:-}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped
