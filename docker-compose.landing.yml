services:
  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
