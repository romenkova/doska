# Dokploy deploy. Point Dokploy's Compose path at this file.
# Reuses the prebuilt `latest` images + env from docker-compose.selfhost.yml via
# `extends:` (one source of truth). Set DATABASE_URL in the Dokploy env UI to your
# managed Postgres. The selfhost server depends_on its bundled db (commented out
# in that file), so we reset depends_on here to drop that wiring.
services:
  server:
    extends:
      file: docker-compose.selfhost.yml
      service: server
    depends_on: !reset {}
    expose:
      - "3000"
    networks:
      - dokploy-network

  web:
    extends:
      file: docker-compose.selfhost.yml
      service: web
    # Drop selfhost's published host port — Traefik handles ingress.
    ports: !reset []
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - dokploy-network

networks:
  # Shared Dokploy network: where the managed DB lives and Traefik routes from.
  dokploy-network:
    external: true
