name: Publish Images

# Builds and pushes the self-host Docker images (web UI + sync server) to GHCR so
# people can run docker-compose.selfhost.yml without cloning or building.
#
# Tags published per release (v* tag): the version (e.g. 0.4.0) and `latest`.
# Manual runs (workflow_dispatch) also publish `latest`. The git tag is the
# single source of truth for the version.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            image: doska-server
            dockerfile: apps/server/Dockerfile
          - name: web
            image: doska-web
            dockerfile: apps/client/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch tags so the client build can stamp its version from git describe.
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: echo "value=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
