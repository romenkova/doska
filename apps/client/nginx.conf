server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Everything the Fastify server owns lives under /api: sync (/api/rpc), auth
    # (/api/auth), the version endpoint (/api/version) and the desktop updater
    # (/api/desktop). One prefix, one proxy block — so a new backend route never
    # silently falls through to the SPA and returns index.html. Same-origin is
    # also what lets the session cookie work without any CORS handling.
    location /api {
        # Variable + resolver forces runtime DNS re-resolution, so nginx follows
        # the server container to its new IP after a restart instead of caching
        # the boot-time IP and 502-ing forever.
        resolver 127.0.0.11 valid=10s;
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # oRPC streams responses and update bundles are large — don't buffer, and
        # allow long downloads.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Hashed build assets are safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The service worker and the shell it precaches are the only way a client
    # learns a new build exists. Cache either one and browsers pin themselves to
    # a stale app until the cache expires, with no way to push an update.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: every other path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
