# Dokploy deploy. Point Dokploy's Compose path at this file.

# Set these in the Dokploy env UI: DATABASE_URL (your managed Postgres),
# AUTH_PASSWORD, AUTH_SECRET. Optionally DOCKER_IMAGE_TAG to pin a version.
services:
  server:
    image: ghcr.io/romenkova/doska-server:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the Dokploy env UI}
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in the Dokploy env UI}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in the Dokploy env UI}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in the Dokploy env UI}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET in the Dokploy env UI}
      S3_REGION: ${S3_REGION:?set S3_REGION in the Dokploy env UI}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID in the Dokploy env UI}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in the Dokploy env UI}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT in the Dokploy env UI}
      FILE_MAX_BYTES: ${FILE_MAX_BYTES:?set FILE_MAX_BYTES in the Dokploy env UI}
      PORT: 3000
      NODE_ENV: production
      # remove once it's public.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BASE_URL: ${BASE_URL:-}
    expose:
      - "3000"
    networks:
      - dokploy-network
    restart: unless-stopped

  web:
    image: ghcr.io/romenkova/doska-web:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
