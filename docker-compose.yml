# Generic standalone deploy: any Docker host.
#   docker compose up -d --build
# Web UI is published on WEB_PORT (default 8080); server stays internal.
services:
  server:
    extends:
      file: docker-compose.base.yml
      service: server
    expose:
      - "3000"

  web:
    extends:
      file: docker-compose.base.yml
      service: web
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-8080}:80"
