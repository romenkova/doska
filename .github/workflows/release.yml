name: Release Desktop

# Builds + signs the Tauri desktop app for macOS, Windows and Linux and publishes
# the bundles plus latest.json to a GitHub Release. While the repo is private these
# assets are auth-gated, so the desktop app downloads them via the apps/server
# proxy (see src/updates.ts); when the repo goes public they become directly
# downloadable and the proxy turns into a pass-through. Either way the endpoint
# baked into installed apps never changes.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           output of `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the password chosen for that key
# (Apple notarization / Windows code-signing secrets are optional, add later.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Windows and Linux are disabled for now — macOS only.
          # - platform: ubuntu-latest
          #   args: ""
          # - platform: windows-latest
          #   args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch tags so `git describe` (client version stamp) resolves.
          fetch-depth: 0

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The git tag is the single source of truth for the version. Stamp it into
      # tauri.conf.json so the built app, latest.json and the updater comparison
      # all match the tag — no hand-maintained version field. (Local edit on the
      # runner only; not committed.)
      - name: Stamp version from tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const f='apps/desktop/src-tauri/tauri.conf.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='$VERSION';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          echo "Stamped tauri.conf.json version = $VERSION"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "Doska ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
