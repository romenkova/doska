packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  # Reaches us only through @better-auth/cli, and we never touch Prisma.
  '@prisma/client': false
  # Pulled in only as drizzle-orm's optional peer; we use pg/PGlite, so it never
  # needs its native build.
  better-sqlite3: false
  esbuild: true
  msw: false

minimumReleaseAgeExclude:
  - '@base-ui/react@1.6.0'
  - '@base-ui/utils@0.3.1'
  - lucide-react@1.21.0
