services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      # Postgres is external — point this at your managed/remote instance.
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    depends_on:
      - server
    # No host port binding: Dokploy's Traefik routes to this container on :80.
    # Point a Domain at this service (container port 80) in the Dokploy UI.
    expose:
      - "80"
    networks:
      # `default` keeps web↔server DNS working; `dokploy-network` lets Traefik
      # reach this container to serve the configured Domain.
      - default
      - dokploy-network
    restart: unless-stopped

networks:
  # Shared network Dokploy's Traefik uses to reach app containers.
  dokploy-network:
    external: true
