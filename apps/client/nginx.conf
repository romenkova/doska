server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # What the Fastify server owns, and nothing else — anything not matched here
    # falls through to the SPA shell below (/sign-in included: the OAuth login
    # page is the app's own). Three prefixes:
    #
    #   /api          sync (/api/rpc), auth (/api/auth, better-auth), version, updater
    #   /.well-known  OAuth discovery, which is where an MCP client starts
    #   /mcp          the board over MCP, for agents
    #
    # Same-origin is also what lets the browser's session cookie work with no
    # CORS handling at all.
    location ~ ^/(api|mcp|\.well-known) {
        # Attachment uploads POST the raw file here. Without this, nginx's 1m
        # default rejects anything larger with an HTML 413 before it ever
        # reaches the server — invisible in dev, where vite proxies /api
        # straight to Fastify. Keep this above FILE_MAX_BYTES: the server owns
        # the real cap and answers with a JSON error the client can show.
        client_max_body_size 1g;

        # Variable + resolver forces runtime DNS re-resolution, so nginx follows
        # the server container to its new IP after a restart instead of caching
        # the boot-time IP and 502-ing forever.
        resolver 127.0.0.11 valid=10s;
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # oRPC streams responses and update bundles are large — don't buffer, and
        # allow long downloads.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Hashed build assets are safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The service worker and the shell it precaches are the only way a client
    # learns a new build exists. Cache either one and browsers pin themselves to
    # a stale app until the cache expires, with no way to push an update.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: every other path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
