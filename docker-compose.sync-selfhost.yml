# Self-host ONLY the sync server — no web UI, no updater proxy.
#
# This is all you need to keep your boards on your own machine: run the desktop
# app locally, point its server URL at this instance, log in, and your data
# syncs to your box instead of a hosted service.
#
# Two ways to provide the database:
#
#   1. Bundled Postgres (zero setup) — activate the `bundled-db` profile:
#        cp .env.sync-selfhost.example .env   # set AUTH_PASSWORD + AUTH_SECRET
#        docker compose -f docker-compose.sync-selfhost.yml \
#          --profile bundled-db up -d --build
#
#   2. Your own managed Postgres — set DATABASE_URL in .env and skip the profile:
#        DATABASE_URL=postgres://user:pass@host:5432/deck
#        docker compose -f docker-compose.sync-selfhost.yml up -d --build
#
# Then in the desktop app's sync settings, set the server URL to
# http://<this-host>:${SERVER_PORT:-3000} and sign in with AUTH_LOGIN /
# AUTH_PASSWORD.
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      # Defaults to the bundled Postgres below; override with your own managed
      # DATABASE_URL to skip the bundled db entirely (leave the profile off).
      DATABASE_URL: ${DATABASE_URL:-postgres://deck:${POSTGRES_PASSWORD:-deck}@db:5432/deck}
      AUTH_LOGIN: ${AUTH_LOGIN:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "${SERVER_PORT:-3000}:3000"
    # No depends_on: the server waits for its database on boot and restarts
    # until it's reachable, which keeps the bundled db genuinely optional.
    restart: unless-stopped

  # Optional bundled Postgres. Only runs when the `bundled-db` profile is active,
  # so a managed-DB deploy never starts it.
  db:
    image: postgres:17-alpine
    profiles:
      - bundled-db
    environment:
      POSTGRES_USER: deck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deck}
      POSTGRES_DB: deck
    volumes:
      - deck-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  deck-pgdata:
