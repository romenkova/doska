# Self-host the full app (web UI + sync server) from prebuilt images
#
# Postgres is bundled by default (data lives in the doska-pgdata volume), so this
# is genuinely one command. To use your own managed Postgres instead, set
# DATABASE_URL in .env — the server will use it and the bundled db sits idle
# (comment the `db` service out if you want it gone).
services:
  server:
    image: ghcr.io/romenkova/doska-server:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      # Defaults to the bundled Postgres below; override with your own managed
      # DATABASE_URL to skip it entirely.
      DATABASE_URL: ${DATABASE_URL:-postgres://doska:${POSTGRES_PASSWORD:-doska}@db:5432/doska}
      # Auth credentials come from the env (see .env.selfhost.example).
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET in the Dokploy env UI}
      S3_REGION: ${S3_REGION:?set S3_REGION in the Dokploy env UI}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID in the Dokploy env UI}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in the Dokploy env UI}
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT in the Dokploy env UI}
      FILE_MAX_BYTES: ${FILE_MAX_BYTES:?set FILE_MAX_BYTES in the Dokploy env UI}
      PORT: 3000
      NODE_ENV: production
      # remove once it's public.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BASE_URL: ${BASE_URL:-}
    depends_on: { db: { condition: service_healthy } }
    restart: unless-stopped

  web:
    image: ghcr.io/romenkova/doska-web:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped

  # Remove this service (and the server's depends_on above)
  # if you point DATABASE_URL at your own managed database.
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: doska
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doska}
      POSTGRES_DB: doska
    volumes:
      - doska-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doska -d doska"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  doska-pgdata:
