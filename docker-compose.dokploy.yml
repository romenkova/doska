# Dokploy deploy. Point Dokploy's Compose path at this file.

# Required in the Dokploy env UI: DATABASE_URL (your managed Postgres),
# AUTH_LOGIN, AUTH_PASSWORD, AUTH_SECRET, BASE_URL (public origin, e.g.
# https://doska.example.com). Optional: the S3_* / AWS_* vars enable card
# attachments, DOCKER_IMAGE_TAG pins a version.
services:
  server:
    image: ghcr.io/romenkova/doska-server:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in the Dokploy env UI}
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in the Dokploy env UI}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in the Dokploy env UI}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in the Dokploy env UI}
      # Attachments are optional: leave S3_BUCKET unset and the feature stays off.
      # Set these in the Dokploy env UI to enable card file uploads.
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      FILE_MAX_BYTES: ${FILE_MAX_BYTES:-}
      PORT: 3000
      NODE_ENV: production
      # remove once it's public.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # This server's public origin, e.g. https://doska.example.com — no trailing
      # slash. OAuth discovery advertises absolute URLs (issuer, token endpoint,
      # the resource_metadata an MCP client is pointed at), so without this they
      # get inferred from proxy headers and an MCP client gets sent to the wrong
      # scheme or host. Cookie auth survives that; MCP does not.
      BASE_URL: ${BASE_URL:?set BASE_URL in the Dokploy env UI, e.g. https://doska.example.com}
    expose:
      - "3000"
    healthcheck:
      # Migrations run on boot before the port opens, hence the start_period.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/version').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - dokploy-network
    restart: unless-stopped

  web:
    image: ghcr.io/romenkova/doska-web:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    expose:
      - "80"
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
