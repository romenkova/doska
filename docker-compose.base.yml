# Shared service definitions reused by the deploy-target compose files via
# `extends:`. Not meant to be run on its own — it carries no networks or
# published ports. See docker-compose.yml (generic) and
# docker-compose.dokploy.yml (Dokploy).
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      AUTH_LOGIN: ${AUTH_LOGIN:?set AUTH_LOGIN in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      PORT: 3000
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BASE_URL: ${BASE_URL:-}
      # Attachment storage (S3). Leave S3_BUCKET unset to disable file uploads.
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      FILE_MAX_BYTES: ${FILE_MAX_BYTES:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped
