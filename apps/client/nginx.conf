server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Sync API and auth go to the Fastify server. Keeping them same-origin is
    # what lets the session cookie work without any CORS handling server-side.
    location /rpc {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # oRPC may stream responses; don't buffer them.
        proxy_buffering off;
    }

    location /auth {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Desktop auto-update endpoint (latest.json + bundle downloads) is served by
    # the Fastify server, which proxies the GitHub Release. Without this it would
    # fall through to the SPA and return index.html.
    location /desktop {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Bundle downloads are large; stream them rather than buffering to disk.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Hashed build assets are safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every other path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
