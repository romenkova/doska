<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Doska — a fast, keyboard-friendly Kanban board for organizing tasks across columns."
    />
    <meta name="theme-color" content="#232939" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Doska — a keyboard-first Kanban board" />
    <meta
      property="og:description"
      content="A fast, keyboard-friendly Kanban board for organizing tasks across columns."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Doska — a keyboard-first Kanban board" />
    <meta
      name="twitter:description"
      content="A fast, keyboard-friendly Kanban board for organizing tasks across columns."
    />
    <title>Doska — a keyboard-first Kanban board</title>
    <script>
      // Apply the persisted theme before first paint to avoid a light/dark
      // flash on load. Mirrors the toggle in App (storageKey "theme").
      // Dark unless the visitor has explicitly picked light here before.
      ;(function () {
        try {
          var t = localStorage.getItem("theme")
          document.documentElement.classList.add(t === "light" ? "light" : "dark")
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
